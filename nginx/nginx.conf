events {
    worker_connections 1024;
}

http {
    # Define the upstream load balancer group
    upstream sync_cluster {
        # Using ip_hash ensures a client stays connected to the same server if it disconnects momentarily.
        # This is optional for true CRDTs but good practice for WebSocket stability.
        ip_hash;
        
        server backend-1:8080;
        server backend-2:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://sync_cluster;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Forward original headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increased timeouts for persistent WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
